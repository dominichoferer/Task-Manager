name: Build Desktop App (DMG)

on:
  push:
    branches:
      - main
      - 'claude/**'
    paths:
      - 'apps/desktop/**'
  workflow_dispatch: # allows manual trigger from GitHub UI

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install electron-builder globally
        run: npm install -g electron-builder@25.1.8

      - name: Install app dependencies
        run: npm install --ignore-scripts=false
        working-directory: apps/desktop

      - name: Build DMG (x64 + arm64)
        run: electron-builder --mac --x64 --arm64
        working-directory: apps/desktop
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: TaskFlow-macOS
          path: apps/desktop/dist/*.dmg
          retention-days: 30

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install electron-builder globally
        run: npm install -g electron-builder@25.1.8

      - name: Install app dependencies
        run: npm install --ignore-scripts=false
        working-directory: apps/desktop

      - name: Build Windows installer
        run: electron-builder --win
        working-directory: apps/desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: TaskFlow-Windows
          path: apps/desktop/dist/*.exe
          retention-days: 30
