name: Build Desktop App (DMG)

on:
  push:
    branches:
      - main
    paths:
      - 'apps/desktop/**'
  workflow_dispatch: # allows manual trigger from GitHub UI

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Install dependencies
        working-directory: apps/desktop
        run: npm install

      - name: Build DMG (x64 + arm64)
        working-directory: apps/desktop
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false   # skip code signing
          TASKFLOW_URL: https://task-manager-nine-topaz.vercel.app
        run: npm run build

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: TaskFlow-macOS
          path: apps/desktop/dist/*.dmg
          retention-days: 30

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: apps/desktop
        run: npm install

      - name: Build Windows installer
        working-directory: apps/desktop
        env:
          TASKFLOW_URL: https://task-manager-nine-topaz.vercel.app
        run: npm run build:win

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: TaskFlow-Windows
          path: apps/desktop/dist/*.exe
          retention-days: 30
