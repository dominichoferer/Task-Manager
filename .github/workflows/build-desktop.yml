name: Build Desktop App (DMG)

on:
  push:
    branches:
      - main
      - 'claude/**'
    paths:
      - 'apps/desktop/**'
  workflow_dispatch: # allows manual trigger from GitHub UI

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies (workspace root)
        run: npm install --ignore-scripts=false

      - name: Fix app-builder binary permissions
        run: |
          find node_modules -name "app-builder_mac" -o -name "app-builder_arm64" | xargs chmod +x 2>/dev/null || true

      - name: Build DMG (x64 + arm64)
        run: npm run build
        working-directory: apps/desktop
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: TaskFlow-macOS
          path: apps/desktop/dist/*.dmg
          retention-days: 30

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies (workspace root)
        run: npm install --ignore-scripts=false

      - name: Build Windows installer
        run: npm run build:win
        working-directory: apps/desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: TaskFlow-Windows
          path: apps/desktop/dist/*.exe
          retention-days: 30
