name: Build Desktop App

on:
  push:
    branches:
      - main
      - 'claude/**'
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest
    outputs:
      version: ${{ steps.pkg.outputs.VERSION }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Get app version
        id: pkg
        run: echo "VERSION=$(node -p "require('./apps/desktop/package.json').version")" >> $GITHUB_OUTPUT

      - name: Install electron-packager
        run: npm install -g electron-packager@17

      - name: Package app
        working-directory: apps/desktop
        run: |
          electron-packager . TaskFlow \
            --platform=darwin \
            --arch=x64,arm64 \
            --out=dist \
            --overwrite \
            --electron-version=33.3.1 \
            --icon=assets/icon.png \
            --app-bundle-id=com.taskflow.app \
            --app-version=${{ steps.pkg.outputs.VERSION }}

      - name: Create DMG (x64)
        run: |
          hdiutil create \
            -volname "TaskFlow" \
            -srcfolder "apps/desktop/dist/TaskFlow-darwin-x64" \
            -ov -format UDZO \
            "apps/desktop/dist/TaskFlow-x64.dmg"

      - name: Create DMG (arm64)
        run: |
          hdiutil create \
            -volname "TaskFlow" \
            -srcfolder "apps/desktop/dist/TaskFlow-darwin-arm64" \
            -ov -format UDZO \
            "apps/desktop/dist/TaskFlow-arm64.dmg"

      - uses: actions/upload-artifact@v4
        with:
          name: TaskFlow-macOS
          path: apps/desktop/dist/*.dmg
          retention-days: 30

      - name: Create GitHub Release (nur main)
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.pkg.outputs.VERSION }}
          name: TaskFlow v${{ steps.pkg.outputs.VERSION }}
          body: "TaskFlow Desktop – macOS (Intel + Apple Silicon)"
          files: |
            apps/desktop/dist/TaskFlow-x64.dmg
            apps/desktop/dist/TaskFlow-arm64.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Get app version
        id: pkg
        run: echo "VERSION=$(node -p "require('./apps/desktop/package.json').version")" >> $env:GITHUB_OUTPUT

      - name: Install electron-packager
        run: npm install -g electron-packager@17

      - name: Package app
        working-directory: apps/desktop
        run: |
          electron-packager . TaskFlow `
            --platform=win32 `
            --arch=x64 `
            --out=dist `
            --overwrite `
            --electron-version=33.3.1 `
            --icon=assets/icon.png `
            --app-version=${{ steps.pkg.outputs.VERSION }}

      - name: Zip Windows build
        shell: pwsh
        run: Compress-Archive -Path apps/desktop/dist/TaskFlow-win32-x64 -DestinationPath apps/desktop/dist/TaskFlow-Windows.zip

      - uses: actions/upload-artifact@v4
        with:
          name: TaskFlow-Windows
          path: apps/desktop/dist/TaskFlow-Windows.zip
          retention-days: 30
